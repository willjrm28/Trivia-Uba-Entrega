<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia UBA - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --azul-rey: #1a237e;
            --azul-medio: #283593;
            --amarillo: #fdd835;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a237e 0%, #283593 50%, #1565c0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-container {
            background: white;
            border-radius: 24px;
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.3);
            animation: fadeUp 0.6s ease forwards;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
        }

        .logo-circulo {
            background: #f0f2ff;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            margin-bottom: 16px;
        }

        .logo-circulo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--azul-rey);
            font-size: 24px;
            margin-bottom: 4px;
        }

        .subtitulo {
            color: #888;
            font-size: 13px;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: var(--azul-rey);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8eaf6;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            color: #333;
            transition: border-color 0.2s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--azul-rey);
        }

        .password-container {
            position: relative;
        }

        .password-container input {
            padding-right: 48px;
        }

        .btn-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            line-height: 1;
        }

        .btn-login {
            background: var(--azul-rey);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            width: 100%;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: var(--azul-medio);
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .footer {
            text-align: center;
            color: #aaa;
            font-size: 11px;
            margin-top: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="login-container">

        <div class="logo-container">
            <div class="logo-circulo">
                <img src="../img/logo_uba.png" alt="Logo UBA">
            </div>
            <h1>Panel Admin</h1>
            <p class="subtitulo">Dirección de Postgrado UBA</p>
        </div>

        <div id="error-msg" class="error-msg"></div>

        <div class="form-group">
            <label>Correo electrónico</label>
            <input type="email" id="email" placeholder="admin@uba.edu.ve"
                onkeypress="if(event.key==='Enter') iniciarSesion()">
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <div class="password-container">
                <input type="password" id="password" placeholder="••••••••"
                    onkeypress="if(event.key==='Enter') iniciarSesion()">
                <button class="btn-toggle" id="btn-toggle" onclick="togglePassword()" type="button">
                    👁️
                </button>
            </div>
        </div>

        <button class="btn-login" onclick="iniciarSesion()">
            Iniciar Sesión
        </button>

        <p class="footer">Sistema de Trivia Educativa UBA</p>

    </div>

    <script src="js/auth.js"></script>
    <script>
        if (estaAutenticado()) {
            window.location.href = 'dashboard.html';
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const btn = document.getElementById('btn-toggle');
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }

        async function iniciarSesion() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            if (!email || !password) {
                errorMsg.textContent = 'Por favor completa todos los campos';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    guardarToken(data.token, data.admin);
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.textContent = data.mensaje;
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.textContent = 'Error de conexión con el servidor';
                errorMsg.style.display = 'block';
            }
        }
    </script>

</body>
</html>
