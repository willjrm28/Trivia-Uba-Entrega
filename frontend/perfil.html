<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Trivia UBA - Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --azul-rey: #1a237e;
            --azul-medio: #283593;
            --amarillo: #fdd835;
        }

        html, body {
            height: 100%;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            position: relative;
            overflow-x: hidden;
        }

        .collage {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            z-index: 1;
        }

        .collage-foto { background-size: cover; background-position: center; }
        .collage-foto:nth-child(1) { background-image: url('img/foto2.jpg'); }
        .collage-foto:nth-child(2) { background-image: url('img/foto5.jpg'); }
        .collage-foto:nth-child(3) { background-image: url('img/foto3.jpg'); }
        .collage-foto:nth-child(4) { background-image: url('img/foto6.jpg'); }
        .collage-foto:nth-child(5) { background-image: url('img/foto1.jpg'); }
        .collage-foto:nth-child(6) { background-image: url('img/foto7.jpg'); }
        .collage-foto:nth-child(7) { background-image: url('img/foto4.jpg'); }
        .collage-foto:nth-child(8) { background-image: url('img/campus.jpg'); }
        .collage-foto:nth-child(9) { background-image: url('img/foto5.jpg'); }

        .filtro {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(
                160deg,
                rgba(26, 35, 126, 0.88) 0%,
                rgba(40, 53, 147, 0.78) 40%,
                rgba(26, 35, 126, 0.92) 100%
            );
            z-index: 2;
        }

        .contenido {
            position: relative;
            z-index: 3;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            max-width: 430px;
            margin: 0 auto;
            gap: 20px;
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeDown 0.6s ease forwards;
        }

        .logo-pequeno {
            background: white;
            border-radius: 50%;
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            margin-bottom: 10px;
        }

        .logo-pequeno img { width: 100%; height: 100%; object-fit: contain; }

        .titulo {
            font-family: 'Playfair Display', serif;
            color: white;
            font-size: 26px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            margin-bottom: 4px;
        }

        .subtitulo {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            font-weight: 300;
            text-align: center;
        }

        .instruccion {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 12px 20px;
            width: 100%;
            text-align: center;
            animation: fadeUp 0.6s ease 0.1s both;
        }

        .instruccion p { color: white; font-size: 13px; font-weight: 300; }
        .instruccion strong { font-weight: 600; color: var(--amarillo); }

        .perfiles {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            animation: fadeUp 0.6s ease 0.2s both;
        }

        .btn-perfil {
            background: rgba(255,255,255,0.95);
            border: none;
            border-radius: 18px;
            padding: 14px 20px;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }

        .btn-perfil:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); background: white; }
        .btn-perfil:active { transform: scale(0.97); }

        .letra {
            background: var(--azul-rey);
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 15px;
            flex-shrink: 0;
        }

        .info-perfil { text-align: left; }
        .info-perfil strong { display: block; color: var(--azul-rey); font-size: 14px; font-weight: 600; }
        .info-perfil span { color: #666; font-size: 11px; font-weight: 300; }

        .footer {
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: fadeUp 0.6s ease 0.4s both;
        }

        @media (max-height: 700px) {
            .contenido { gap: 14px; padding: 24px 20px; }
            .logo-pequeno { width: 52px; height: 52px; }
            .titulo { font-size: 22px; }
            .btn-perfil { padding: 12px 16px; }
            .letra { width: 34px; height: 34px; font-size: 13px; }
            .info-perfil strong { font-size: 13px; }
        }

        @media (max-height: 580px) {
            .instruccion { display: none; }
            .contenido { gap: 10px; }
            .logo-pequeno { width: 44px; height: 44px; margin-bottom: 6px; }
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="collage">
        <div class="collage-foto"></div>
        <div class="collage-foto"></div>
        <div class="collage-foto"></div>
        <div class="collage-foto"></div>
        <div class="collage-foto"></div>
        <div class="collage-foto"></div>
        <div class="collage-foto"></div>
        <div class="collage-foto"></div>
        <div class="collage-foto"></div>
    </div>

    <div class="filtro"></div>

    <div class="contenido">
        <div class="header">
            <div class="logo-pequeno">
                <img src="img/logo_uba.png" alt="Logo UBA">
            </div>
            <h1 class="titulo">¿Quién eres?</h1>
            <p class="subtitulo">Selecciona tu perfil para continuar</p>
        </div>

        <div class="instruccion">
            <p>Elige tu perfil y recibe <strong>preguntas personalizadas</strong> para ti</p>
        </div>

        <div class="perfiles">
            <button class="btn-perfil" onclick="seleccionarPerfil('Estudiante')">
                <div class="letra">A</div>
                <div class="info-perfil">
                    <strong>Estudiante UBA</strong>
                    <span>Preguntas de investigación por escuela</span>
                </div>
            </button>
            <button class="btn-perfil" onclick="seleccionarPerfil('Profesor')">
                <div class="letra">B</div>
                <div class="info-perfil">
                    <strong>Profesor UBA</strong>
                    <span>Preguntas avanzadas de investigación</span>
                </div>
            </button>
            <button class="btn-perfil" onclick="seleccionarPerfil('Trabajador')">
                <div class="letra">C</div>
                <div class="info-perfil">
                    <strong>Trabajador UBA</strong>
                    <span>Preguntas de cultura organizacional</span>
                </div>
            </button>
            <button class="btn-perfil" onclick="seleccionarPerfil('Invitado')">
                <div class="letra">D</div>
                <div class="info-perfil">
                    <strong>Invitado</strong>
                    <span>Preguntas de cultura UBA</span>
                </div>
            </button>
        </div>

        <p class="footer">Dirección de Postgrado UBA</p>
    </div>

    <script>
        function seleccionarPerfil(perfil) {
            sessionStorage.setItem('perfil', perfil);
            if (perfil === 'Estudiante' || perfil === 'Profesor') {
                window.location.href = 'escuela.html';
            } else {
                window.location.href = 'trivia.html';
            }
        }
    </script>

</body>
</html>
